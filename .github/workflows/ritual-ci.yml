name: ritual-ci
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files (basic)
        run: |
          set -e
          python - <<'PY'
import json, pathlib, sys
bad = []
for p in pathlib.Path('.').rglob('*.json'):
    try:
        json.loads(p.read_text(encoding='utf-8'))
    except Exception as e:
        bad.append((str(p), str(e)))
if bad:
    print('Invalid JSON files:')
    for f,e in bad: print(f,'->',e)
    sys.exit(1)
else:
    print('All JSON parse OK')
PY
      - name: Validate routes file exists
        run: |
          test -f routes/ritual.yaml && echo "routes/ritual.yaml found" || (echo "No routes/ritual.yaml"; exit 1)
